<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- font css  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- fontawesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl">
                    <img class="w-[36px]" src="assets/github-logo.png" alt="">
                    <span class="text-[24px] font-semibold text-[#1F293]">GitHub Issues Tracker</span>
                </a>
            </div>
            <!-- desktop view  -->
            <div class="hidden md:block">
                <div class="flex gap-2">


                    <div class="search relative">
                        <i class="fa-brands fa-sistrix absolute z-10 left-1 top-3 text-[18px] text-[#64748B]"></i>
                        <input type="text" id="search_input" placeholder="Search Issue..."
                            class="input input-bordered pl-7 text-[#64748B] w-24 md:w-auto" />
                    </div>
                    <button onclick="GlobalSearch()"
                        class="btn bg-[#4A00FF] text-white font-semibold text-[16px]">Search</button>



                </div>
            </div>

            <!-- mobile view  -->
            <div class="block md:hidden">
                <button onclick="ToggleMenu()"><i class="fa-solid fa-list-ul"></i></button>
            </div>

        </div>


        <div id="small_device" class="pt-4 navbar hidden">
            <div class="flex gap-2">


                <div class="search relative">
                    <i class="fa-brands fa-sistrix absolute z-10 left-1 top-3 text-[18px] text-[#64748B]"></i>
                    <input type="text" id="search_input_mobile" placeholder="Search Issue..."
                        class="input input-bordered pl-7 text-[#64748B] md:w-auto" />
                </div>
                <button onclick="GlobalSearchMobile()" class="btn bg-[#4A00FF] text-white font-semibold text-[16px]">Search</button>



            </div>
        </div>

    </header>

    <main class="pt-[30px] md:pt-[60px] bg-[#F8FAFC]">
        <section id="main" class="w-10/12 mx-auto bg-[#FFFFFF] p-6 shadow-sm rounded-sm">
            <div class="tabing">
                <button id="all_tab" onclick="AllIssueData('all_tab')"
                    class="btn w-[120px] bg-white text-[#64748B] tab_btn font-medium active">All</button>
                <button id="open" onclick="OpenIssueData('open')"
                    class="btn w-[120px] bg-white text-[#64748B] tab_btn font-medium">Open</button>
                <button id="closed" onclick="ClosedIssueData('closed')"
                    class="btn w-[120px] bg-white text-[#64748B] tab_btn font-medium">Closed</button>
            </div>
        </section>

        <section id="issue-body" class="w-10/12 mx-auto shadow bg-[#FBFBFB] mt-4">

            <div
                class="issue_head p-6 bg-[#FFFFFF] flex flex-col md:flex-row justify-between  items-center rounded-tl-lg rounded-tr-lg border-b border-gray-200">
                <div class="issue_head_left flex gap-2 items-center">

                    <img class="bg-[#ECE4FF] p-3 rounded-full" src="assets/Aperture.png" alt="">
                    <div class="issue_head_info">
                        <h2 class="text-[#1F2937] text-[20px] font-semibold">
                            <span id="TotalItemCount"></span>
                            <span id="ItemCountLoader" class="loading loading-ring loading-lg hidden"></span>
                            Issues
                        </h2>
                        <p class="text-[#64748B] text-[16px]">Track and manage your project issues</p>
                    </div>

                </div>
                <div class="issue_head_right flex gap-3 pt-3 md:pt-0">
                    <div class="dot_circle flex gap-1 items-center">
                        <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div>
                        <p class="font-medium text-[#1F2937] text-[16px]">Open</p>
                    </div>
                    <div class="dot_circle flex gap-1 items-center">
                        <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
                        <p class="font-medium text-[#1F2937]  text-[16px]">Closed</p>
                    </div>
                </div>
            </div>

            <!-- loader spinner  -->

            <section id="data_loader_spinner" class="flex justify-center items-center pt-5 pb-5 hidden">
                <span class="loading loading-bars loading-xs"></span>
                <span class="loading loading-bars loading-sm"></span>
                <span class="loading loading-bars loading-md"></span>
                <span class="loading loading-bars loading-lg"></span>
                <span class="loading loading-bars loading-xl"></span>
            </section>

            <div id="data_container" class="issue_cards p-6 bg-[#FBFBFB] grid gap-3 md:grid-cols-4">
            </div>

        </section>
    </main>

    <dialog id="issue_modal" class="modal modal-middle sm:modal-middle">
        <div class="modal-box w-12/12 md:w-6/12 md:max-w-5xl">
            
            <div id="modal_container">

           

            </div>


            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn bg-[#4A00FF] text-white">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="js/menu_toggle.js"></script>
    <script src="js/load_data.js"></script>
</body>

</html>
